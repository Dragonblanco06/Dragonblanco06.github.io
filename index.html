<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItalApp</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            color: #222;
        }

        .container {
            max-width: 900px;
            margin: 80px auto;
            background: white;
            padding: 50px;
            border-radius: 14px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            color: #111;
        }

        p {
            font-size: 18px;
            line-height: 1.7;
            color: #444;
        }

        .links {
            margin-top: 40px;
        }

        .links a {
            display: inline-block;
            margin: 10px;
            padding: 14px 24px;
            text-decoration: none;
            border-radius: 8px;
            background-color: #111;
            color: white;
            transition: 0.2s ease;
        }

        .links a:hover {
            opacity: 0.9;
        }

        footer {
            margin-top: 50px;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>
